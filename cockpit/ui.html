<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus Cockpit</title>
<style>
  :root{
    --bg:#FAF9F5; --surface:#FFFFFF; --surface2:#F1EFE8;
    --text:#2C2C2A; --text2:#5F5E5A; --text3:#888780;
    --border:rgba(0,0,0,.12); --border2:rgba(0,0,0,.22);
    --accent:#0C447C; --teal:#0F6E56; --warn:#854F0B;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --r:10px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#262624; --surface:#30302E; --surface2:#3A3A38;
      --text:#F1EFE8; --text2:#B4B2A9; --text3:#888780;
      --border:rgba(255,255,255,.12); --border2:rgba(255,255,255,.24);
      --accent:#7FB2EC; --teal:#4ECCA8; --warn:#FAC775;
    }
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);
       display:flex;flex-direction:column;height:100vh;}
  header{padding:.9rem 1.25rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:.5rem;}
  header h1{font-size:16px;font-weight:500;margin:0;}
  header .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);}
  header .sub{font-size:12px;color:var(--text3);margin-left:auto;font-family:var(--mono);}
  #chat{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:14px;
        max-width:820px;width:100%;margin:0 auto;}
  .msg{display:flex;flex-direction:column;gap:4px;max-width:88%;}
  .msg .who{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
  .msg .body{padding:.7rem .9rem;border-radius:var(--r);font-size:14px;line-height:1.55;
             white-space:pre-wrap;word-break:break-word;}
  .msg.user{align-self:flex-end;align-items:flex-end;}
  .msg.user .body{background:var(--surface2);}
  .msg.bot{align-self:flex-start;}
  .msg.bot .body{background:var(--surface);border:.5px solid var(--border);}
  .tools{display:flex;flex-direction:column;gap:3px;margin:2px 0;}
  .toolchip{font-size:12px;color:var(--text3);font-family:var(--mono);}
  .toolchip .ic{color:var(--accent);}
  .err{color:var(--warn);font-size:13px;}
  .meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
  footer{border-top:.5px solid var(--border);padding:.75rem 1.25rem;}
  .inp{max-width:820px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;}
  textarea{flex:1;resize:none;font-family:inherit;font-size:14px;line-height:1.5;color:var(--text);
           background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);
           padding:.6rem .8rem;max-height:160px;}
  textarea:focus{outline:none;border-color:var(--accent);}
  button{font-family:inherit;font-size:14px;padding:.6rem 1.1rem;border-radius:var(--r);
         border:.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;}
  button:hover:not(:disabled){background:var(--surface2);}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .hint{max-width:820px;margin:.4rem auto 0;font-size:11px;color:var(--text3);}
  .empty{color:var(--text3);font-size:14px;text-align:center;margin:auto;}
</style>
</head>
<body>
<header>
  <span class="dot" aria-hidden="true"></span>
  <h1>Nexus Cockpit</h1>
  <span class="sub" id="model">sonnet</span>
</header>

<div id="chat">
  <div class="empty" id="empty">Pregunta algo sobre tus proyectos. Ej: <em>¿qué consume checkempresa y quién lo provee?</em></div>
</div>

<footer>
  <div class="inp">
    <textarea id="box" rows="1" placeholder="Escribe tu mensaje…" autofocus></textarea>
    <button id="send">Enviar</button>
  </div>
  <div class="hint">Enter envía · Shift+Enter salto de línea · el agente usa las tools del hub</div>
</footer>

<script>
const chat = document.getElementById('chat');
const box = document.getElementById('box');
const sendBtn = document.getElementById('send');
let busy = false;

function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}

function addMsg(who, cls){
  const empty = document.getElementById('empty'); if(empty) empty.remove();
  const m = document.createElement('div'); m.className = 'msg ' + cls;
  const w = document.createElement('div'); w.className='who'; w.textContent = who;
  const b = document.createElement('div'); b.className='body';
  m.appendChild(w); m.appendChild(b); chat.appendChild(m);
  chat.scrollTop = chat.scrollHeight;
  return b;
}

function autosize(){ box.style.height='auto'; box.style.height=Math.min(box.scrollHeight,160)+'px'; }
box.addEventListener('input', autosize);

box.addEventListener('keydown', function(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

async function send(){
  const msg = box.value.trim();
  if(!msg || busy) return;
  busy = true; sendBtn.disabled = true;
  addMsg('tú','user').textContent = msg;
  box.value=''; autosize();

  const bot = addMsg('nexus','bot');
  const tools = document.createElement('div'); tools.className='tools'; bot.appendChild(tools);
  const text = document.createElement('span'); bot.appendChild(text);
  let acc = '';
  let thinking = document.createElement('span'); thinking.className='toolchip'; thinking.textContent='pensando…';
  tools.appendChild(thinking);

  try{
    const res = await fetch('/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message: msg})
    });
    if(!res.ok || !res.body) throw new Error('HTTP '+res.status);
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf='';
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      let i;
      while((i = buf.indexOf('\n\n')) >= 0){
        const raw = buf.slice(0,i); buf = buf.slice(i+2);
        const line = raw.replace(/^data: ?/, '');
        if(!line) continue;
        let ev; try{ ev = JSON.parse(line); }catch(_){ continue; }
        if(thinking){ thinking.remove(); thinking=null; }
        if(ev.type==='tool'){
          const t=document.createElement('div'); t.className='toolchip';
          t.innerHTML='<span class="ic">⚙</span> usando '+esc(ev.name);
          tools.appendChild(t);
        } else if(ev.type==='text'){
          acc += ev.text; text.textContent = acc;
        } else if(ev.type==='result'){
          if(!acc && ev.text){ acc = String(ev.text); text.textContent = acc; }
          if(ev.cost_usd!=null){
            const meta=document.createElement('div'); meta.className='meta';
            meta.textContent='costo: $'+Number(ev.cost_usd).toFixed(4);
            bot.appendChild(meta);
          }
        } else if(ev.type==='error'){
          const er=document.createElement('div'); er.className='err'; er.textContent='Error: '+esc(ev.text);
          bot.appendChild(er);
        }
        chat.scrollTop = chat.scrollHeight;
      }
    }
    if(!acc && !bot.querySelector('.err')){ text.textContent='(sin respuesta)'; }
  }catch(err){
    if(thinking){ thinking.remove(); }
    const er=document.createElement('div'); er.className='err'; er.textContent='Error de conexión: '+esc(err.message);
    bot.appendChild(er);
  }finally{
    busy=false; sendBtn.disabled=false; box.focus();
    chat.scrollTop = chat.scrollHeight;
  }
}

fetch('/health').then(r=>r.json()).then(h=>{ if(h && h.model) document.getElementById('model').textContent=h.model; }).catch(()=>{});
</script>
</body>
</html>
